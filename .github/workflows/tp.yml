name: yeahyeah
on:
  push

jobs:
  execute_binary_windowscringemax:
    runs-on:  windows-latest
    steps:
      - name: verify binary execution on cringdows
        uses: actions/checkout@master

      - name: Clone project
        run: git clone https://github.com/jamailia-pm/sobel_morpho.git

      - name: Install CMake
        run: winget install cmake --accept-package-agreements --accept-source-agreements

      - name: Build project
        run: |
          cd sobel_morpho
          cmake 
          cmake --build . --config Release

      - name: Run binary
        run: |
          cd sobel_morpho/build/Release
          ./sobel.exe