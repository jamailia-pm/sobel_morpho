name: yeahyeah
on:
  push

jobs:
  execute_binary:
    runs-on: ubuntu-slim
    steps:
      - name: verify binary execution
        uses: actions/checkout@master

      - name: build and execute
        run: |
          git clone https://github.com/jamailia-pm/sobel_morpho.git
          sudo apt update
          sudo apt install cmake libsdl2-dev
          cd sobel_morpho
          ./CMakeGCC.sh